asset_id: classic_smth_010
source_title: "삼명통회 (三命通會)"
source_chapter: "寄生十二宮"
original_text: "長生、沐浴、冠帶、臨官、帝旺、衰、病、死、墓、絕、胎、養，循環無端，周而復始。"
original_reading: "장생, 목욕, 관대, 임관, 제왕, 쇠, 병, 사, 묘, 절, 태, 양, 순환무단, 주이부시."
modern_translation: >
  기운이 태어나 자라고 왕성했다가 스러지는 12단계(12운성)는
  끝없이 순환하며 다시 시작된다 — 강약 판정의 보조 축.
