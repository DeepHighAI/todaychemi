source_title: "연해자평 (淵海子平)"
source_chapter: "地支藏遁歌"
original_text: "子宮癸水在其中，丑癸辛金己土同；寅宮甲木兼丙戊，卯宮乙木獨相逢。辰藏乙戊三分癸，巳中庚金丙戊叢。"
original_reading: "자궁계수재기중, 축계신금기토동; 인궁갑목겸병무, 묘궁을목독상봉. 진장을무삼분계, 사중경금병무총."
modern_translation: >
  지지 속에 숨은 천간(지장간)의 정본 노래 전반부 —
  子=癸, 丑=癸·辛·己, 寅=甲·丙·戊, 卯=乙, 辰=乙·戊·癸, 巳=庚·丙·戊 구성.
