source_title: "적천수 (滴天髓)"
source_chapter: "體用"
original_text: "道有體用，不可以一端論也，要在扶之抑之得其宜。"
original_reading: "도유체용, 불가이일단론야, 요재부지억지득기의."
modern_translation: >
  몸체(體)와 쓰임(用)은 한쪽만으로 논할 수 없으며, 핵심은
  붙들어 줄지(扶) 눌러 줄지(抑)를 알맞게 정하는 데 있다 — 용신 선택의 강령.
