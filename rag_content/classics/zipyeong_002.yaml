source_title: "자평진전 (子平真詮)"
source_chapter: "論陰陽生死"
original_text: "陽主聚，以進為進，故主順；陰主散，以退為退，故主逆。長生沐浴等項，所以有陽順陰逆之殊也。"
original_reading: "양주취, 이진위진, 고주순; 음주산, 이퇴위퇴, 고주역. 장생목욕등항, 소이유양순음역지수야."
modern_translation: >
  양간은 모으는 성질이라 앞으로 나아가고(순행) 음간은 흩어지는
  성질이라 뒤로 물러난다(역행) — 12운성 양순음역(봉법)의 근거.
