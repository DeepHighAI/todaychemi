source_title: "적천수 (滴天髓)"
source_chapter: "衰旺論"
original_text: "旺中有衰者存，不可損也。衰中有旺者存，不可益也。"
original_reading: "왕중유쇠자존, 불가손야. 쇠중유왕자존, 불가익야."
modern_translation: >
  강해 보여도 약한 구석이, 약해 보여도 강한 구석이 숨어 있어
  일률적으로 더하고 빼면 안 된다 — 단순 강약 판정의 한계 경계.
