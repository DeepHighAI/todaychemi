original_text: "能知衰旺之真機，其於立命之奧，思過半矣。旺則宜洩宜傷，衰則喜幫喜助"
original_reading: "능지쇠왕지진기, 기어립명지오, 사과반의. 왕즉의설의상, 쇠즉희방희조"
modern_translation: >
  기운이 강하면 덜어내고(설·상) 약하면 도와주는(방·조) 것이
  명리의 핵심 — 신강·신약을 가려 균형을 맞추는 억부의 근거.
