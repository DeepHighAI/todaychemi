source_title: "연해자평 (淵海子平)"
source_chapter: "地支藏遁歌"
original_text: "午宮丁火併己土，未宮乙己丁共宗。申位庚金壬水戊，酉宮辛金獨豐隆；戌宮辛金及丁戊，亥藏壬甲是真蹤。"
original_reading: "오궁정화병기토, 미궁을기정공종. 신위경금임수무, 유궁신금독풍륭; 술궁신금급정무, 해장임갑시진종."
modern_translation: >
  지장간 노래 후반부 — 午=丁·己, 未=乙·己·丁, 申=庚·壬·戊,
  酉=辛, 戌=辛·丁·戊, 亥=壬·甲 구성. 표면 글자 뒤의 숨은 기운.
